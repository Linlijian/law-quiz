<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังข้อสอบกฎหมายอัยการ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .option-btn:disabled { cursor: not-allowed; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="app" class="max-w-2xl mx-auto px-4 py-8">
        
        <div id="menu-ui" class="animate-pop">
            <div class="text-center mb-10">
                <h1 class="text-4xl font-black text-slate-800 mb-2">คลังข้อสอบอัยการ</h1>
                <p class="text-slate-500">เลือกชุดคำถามที่ต้องการทดสอบ</p>
            </div>
            
            <div id="set-list" class="space-y-4">
                <div class="p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 cursor-pointer transition-all hover:shadow-md" onclick="loadSet('questions.json', 'ชุดที่ 1: พรบ.องค์กรอัยการ ๒๕๕๓')">
                    <h3 class="text-xl font-bold text-slate-700">ชุดที่ 1: พรบ.องค์กรอัยการ ๒๕๕๓</h3>
                    <p class="text-slate-400 text-sm mt-1">สุ่มครั้งละ 10 ข้อ จากคลังข้อสอบทั้งหมด</p>
                </div>
                
                <div class="p-6 bg-white rounded-2xl shadow-sm border border-slate-200 hover:border-blue-500 cursor-pointer transition-all hover:shadow-md" onclick="loadSet('set2.json', 'ชุดที่ 2: ระเบียบข้าราชการฝ่ายอัยการ')">
                    <h3 class="text-xl font-bold text-slate-700">ชุดที่ 2: ระเบียบข้าราชการฝ่ายอัยการ</h3>
                    <p class="text-slate-400 text-sm mt-1">สุ่มครั้งละ 10 ข้อ จากคลังข้อสอบทั้งหมด</p>
                </div>
            </div>
        </div>

        <div id="loading-ui" class="hidden text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
            <p class="mt-4 text-slate-600">กำลังเตรียมข้อสอบ...</p>
        </div>

        <div id="quiz-ui" class="hidden">
            <div class="flex items-center mb-6">
                <button onclick="location.reload()" class="mr-4 text-slate-400 hover:text-slate-600">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                    </svg>
                </button>
                <h2 id="current-set-title" class="text-lg font-bold text-slate-700 truncate">กำลังทำข้อสอบ...</h2>
            </div>

            <div class="w-full bg-slate-200 rounded-full h-2 mb-6">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
                <div class="flex justify-between items-start mb-4">
                    <span id="q-number" class="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded">ข้อที่ 1/10</span>
                </div>
                
                <h2 id="q-text" class="text-xl font-semibold text-slate-800 leading-relaxed mb-6">คำถาม...</h2>

                <div id="options-container" class="space-y-3"></div>

                <div id="explanation-box" class="hidden mt-6 p-4 bg-emerald-50 border-l-4 border-emerald-500 rounded animate-pop">
                    <h4 class="text-emerald-800 font-bold mb-1 text-sm">เฉลย/คำอธิบาย:</h4>
                    <p id="explanation-text" class="text-emerald-700 text-sm"></p>
                </div>
            </div>

            <div class="flex justify-end">
                <button id="next-btn" onclick="handleNext()" class="hidden bg-slate-800 text-white px-8 py-3 rounded-xl font-semibold hover:bg-slate-700 transition-colors shadow-lg">
                    ข้อถัดไป
                </button>
            </div>
        </div>

        <div id="result-ui" class="hidden bg-white rounded-3xl shadow-xl p-10 text-center border border-slate-100 animate-pop">
            <div class="mb-6">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-100 rounded-full mb-4">
                    <span class="text-3xl">🏆</span>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">สรุปคะแนน</h2>
            </div>
            <div class="text-6xl font-black text-blue-600 mb-4">
                <span id="final-score">0</span><span class="text-2xl text-slate-400">/10</span>
            </div>
            <p id="feedback-msg" class="text-slate-600 mb-8 font-medium italic"></p>
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all">
                กลับหน้าหลัก
            </button>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let selectedQuestions = [];
        let currentIndex = 0;
        let score = 0;

        // ฟังก์ชันเลือกชุดคำถาม
        async function loadSet(fileName, setTitle) {
            document.getElementById('menu-ui').classList.add('hidden');
            document.getElementById('loading-ui').classList.remove('hidden');
            document.getElementById('current-set-title').innerText = setTitle;
            
            try {
                const response = await fetch(fileName);
                if (!response.ok) throw new Error('Network error');
                allQuestions = await response.json();
                
                // จำลองการโหลดเล็กน้อยเพื่อให้ UI ดูลื่นไหล
                setTimeout(() => {
                    document.getElementById('loading-ui').classList.add('hidden');
                    document.getElementById('quiz-ui').classList.remove('hidden');
                    startQuiz();
                }, 500);
            } catch (error) {
                alert('เกิดข้อผิดพลาด: ไม่พบไฟล์ ' + fileName);
                location.reload();
            }
        }

        function startQuiz() {
            selectedQuestions = [...allQuestions]
                .sort(() => 0.5 - Math.random())
                .slice(0, 10);
            currentIndex = 0;
            score = 0;
            showQuestion();
        }

        function showQuestion() {
            const q = selectedQuestions[currentIndex];
            const qNumDisplay = currentIndex + 1;
            
            document.getElementById('q-number').innerText = `ข้อที่ ${qNumDisplay}/10`;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('progress-bar').style.width = `${(qNumDisplay / 10) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const labels = ['ก.', 'ข.', 'ค.', 'ง.'];
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 border-2 border-slate-100 rounded-xl hover:bg-slate-50 transition-all flex items-start group";
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 bg-slate-100 text-slate-500 rounded-lg flex items-center justify-center font-bold mr-3 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">${labels[index]}</span>
                    <span class="text-slate-700 font-medium pt-1">${opt}</span>
                `;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });

            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        function checkAnswer(selectedIndex, clickedBtn) {
            const q = selectedQuestions[currentIndex];
            const correctIndex = q.answer;
            const buttons = document.querySelectorAll('.option-btn');

            buttons.forEach(btn => btn.disabled = true);

            if (selectedIndex === correctIndex) {
                clickedBtn.classList.replace('border-slate-100', 'border-emerald-500');
                clickedBtn.classList.add('bg-emerald-50');
                score++;
            } else {
                clickedBtn.classList.replace('border-slate-100', 'border-red-500');
                clickedBtn.classList.add('bg-red-50');
                buttons[correctIndex].classList.replace('border-slate-100', 'border-emerald-500');
                buttons[correctIndex].classList.add('bg-emerald-50');
            }

            // แสดงคำอธิบาย
            const desc = q.explanation ? q.explanation : `เฉลยคือข้อ ${['ก','ข','ค','ง'][correctIndex]}`;
            document.getElementById('explanation-text').innerText = desc;
            document.getElementById('explanation-box').classList.remove('hidden');
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function handleNext() {
            currentIndex++;
            if (currentIndex < 10) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            let msg = score >= 8 ? "เก่งมาก!" : score >= 5 ? "ผ่านเกณฑ์" : "ควรทบทวนเพิ่มเติม";
            document.getElementById('feedback-msg').innerText = msg;
        }
    </script>
</body>
</html>
