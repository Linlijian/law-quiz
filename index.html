<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังข้อสอบกฎหมายอัยการ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; }
        .option-btn:disabled { cursor: not-allowed; }
        .animate-pop { animation: pop 0.3s ease-out; }
        @keyframes pop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">

    <div id="app" class="max-w-2xl mx-auto px-4 py-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">แบบทดสอบกฎหมายอัยการ</h1>
            <p class="text-slate-500 mt-2">สุ่มทดสอบครั้งละ 10 ข้อ</p>
        </div>

        <div id="loading" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-8 w-8 border-4 border-blue-600 border-t-transparent"></div>
            <p class="mt-4 text-slate-600">กำลังโหลดข้อสอบ...</p>
        </div>

        <div id="quiz-ui" class="hidden">
            <div class="w-full bg-slate-200 rounded-full h-2 mb-6">
                <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
            </div>

            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 mb-6">
                <div class="flex justify-between items-start mb-4">
                    <span id="q-number" class="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded">ข้อที่ 1/10</span>
                </div>
                
                <h2 id="q-text" class="text-xl font-semibold text-slate-800 leading-relaxed mb-6">
                    คำถามกำลังโหลด...
                </h2>

                <div id="options-container" class="space-y-3">
                    </div>

                <div id="explanation-box" class="hidden mt-6 p-4 bg-emerald-50 border-l-4 border-emerald-500 rounded animate-pop">
                    <h4 class="text-emerald-800 font-bold mb-1 text-sm">เฉลย/คำอธิบาย:</h4>
                    <p id="explanation-text" class="text-emerald-700 text-sm"></p>
                </div>
            </div>

            <div class="flex justify-end">
                <button id="next-btn" onclick="handleNext()" class="hidden bg-slate-800 text-white px-8 py-3 rounded-xl font-semibold hover:bg-slate-700 transition-colors shadow-lg shadow-slate-200">
                    ข้อถัดไป
                </button>
            </div>
        </div>

        <div id="result-ui" class="hidden bg-white rounded-3xl shadow-xl p-10 text-center border border-slate-100 animate-pop">
            <div class="mb-6">
                <div class="inline-flex items-center justify-center w-20 h-20 bg-blue-100 rounded-full mb-4">
                    <span class="text-3xl">🏆</span>
                </div>
                <h2 class="text-3xl font-bold text-slate-800">สรุปคะแนน</h2>
            </div>
            <div class="text-6xl font-black text-blue-600 mb-4">
                <span id="final-score">0</span><span class="text-2xl text-slate-400">/10</span>
            </div>
            <p id="feedback-msg" class="text-slate-600 mb-8 font-medium italic"></p>
            <button onclick="location.reload()" class="w-full bg-blue-600 text-white px-8 py-4 rounded-2xl font-bold text-lg hover:bg-blue-700 transition-all transform hover:-translate-y-1">
                ลองทำอีกครั้ง
            </button>
        </div>
    </div>

    <script>
        let allQuestions = [];
        let selectedQuestions = [];
        let currentIndex = 0;
        let score = 0;

        // 1. โหลดข้อมูลจาก JSON
        async function loadData() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error('โหลดไฟล์ไม่ได้');
                allQuestions = await response.json();
                
                startQuiz();
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <p class="text-red-500 font-bold">เกิดข้อผิดพลาด: ไม่พบไฟล์ questions.json</p>
                    <p class="text-slate-400 text-sm mt-2">กรุณารัน Python Script ก่อนอัปโหลด</p>
                `;
            }
        }

        // 2. เริ่มต้น Quiz
        function startQuiz() {
            // สุ่มเลือก 10 ข้อจากทั้งหมด
            selectedQuestions = [...allQuestions]
                .sort(() => 0.5 - Math.random())
                .slice(0, 10);

            document.getElementById('loading').classList.add('hidden');
            document.getElementById('quiz-ui').classList.remove('hidden');
            showQuestion();
        }

        // 3. แสดงคำถาม
        function showQuestion() {
            const q = selectedQuestions[currentIndex];
            const qNumDisplay = currentIndex + 1;
            
            document.getElementById('q-number').innerText = `ข้อที่ ${qNumDisplay}/10`;
            document.getElementById('q-text').innerText = q.question;
            document.getElementById('progress-bar').style.width = `${(qNumDisplay / 10) * 100}%`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            const labels = ['ก.', 'ข.', 'ค.', 'ง.'];
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "option-btn w-full text-left p-4 border-2 border-slate-100 rounded-xl hover:bg-slate-50 hover:border-blue-200 transition-all flex items-start group";
                btn.innerHTML = `
                    <span class="w-8 h-8 flex-shrink-0 bg-slate-100 text-slate-500 rounded-lg flex items-center justify-center font-bold mr-3 group-hover:bg-blue-100 group-hover:text-blue-600 transition-colors">${labels[index]}</span>
                    <span class="text-slate-700 font-medium pt-1">${opt}</span>
                `;
                btn.onclick = () => checkAnswer(index, btn);
                container.appendChild(btn);
            });

            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
        }

        // 4. ตรวจคำตอบ
        function checkAnswer(selectedIndex, clickedBtn) {
            const q = selectedQuestions[currentIndex];
            const correctIndex = q.answer;
            const buttons = document.querySelectorAll('.option-btn');

            buttons.forEach(btn => btn.disabled = true);

            if (selectedIndex === correctIndex) {
                // ตอบถูก
                clickedBtn.classList.replace('border-slate-100', 'border-emerald-500');
                clickedBtn.classList.add('bg-emerald-50');
                clickedBtn.querySelector('span').classList.replace('bg-slate-100', 'bg-emerald-500');
                clickedBtn.querySelector('span').classList.replace('text-slate-500', 'text-white');
                score++;
            } else {
                // ตอบผิด
                clickedBtn.classList.replace('border-slate-100', 'border-red-500');
                clickedBtn.classList.add('bg-red-50');
                clickedBtn.querySelector('span').classList.replace('bg-slate-100', 'bg-red-500');
                clickedBtn.querySelector('span').classList.replace('text-slate-500', 'text-white');

                // แสดงข้อที่ถูกด้วย
                const correctBtn = buttons[correctIndex];
                correctBtn.classList.replace('border-slate-100', 'border-emerald-500');
                correctBtn.classList.add('bg-emerald-50');
            }

            // แสดงคำอธิบาย (ถ้ามีใน JSON)
            if (q.explanation || q.options[correctIndex]) {
                const desc = q.explanation ? q.explanation : `คำตอบที่ถูกต้องคือข้อ ${['ก','ข','ค','ง'][correctIndex]}. ${q.options[correctIndex]}`;
                document.getElementById('explanation-text').innerText = desc;
                document.getElementById('explanation-box').classList.remove('hidden');
            }

            document.getElementById('next-btn').classList.remove('hidden');
        }

        // 5. เปลี่ยนข้อ
        function handleNext() {
            currentIndex++;
            if (currentIndex < 10) {
                showQuestion();
            } else {
                showResult();
            }
        }

        // 6. หน้าสรุปคะแนน
        function showResult() {
            document.getElementById('quiz-ui').classList.add('hidden');
            document.getElementById('result-ui').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;

            let msg = "";
            if (score === 10) msg = "ยอดเยี่ยมมาก! คุณจำกฎหมายได้แม่นยำที่สุด";
            else if (score >= 7) msg = "เก่งมาก! อีกนิดเดียวจะเต็มแล้ว";
            else if (score >= 5) msg = "ผ่านเกณฑ์! ควรทบทวนจุดที่ผิดบ่อยๆ นะครับ";
            else msg = "พยายามต่อไปครับ การฝึกฝนจะทำให้คุณเก่งขึ้น";
            document.getElementById('feedback-msg').innerText = msg;
        }

        // เริ่มโหลดข้อมูลเมื่อเปิดหน้าเว็บ
        loadData();
    </script>
</body>
</html>
